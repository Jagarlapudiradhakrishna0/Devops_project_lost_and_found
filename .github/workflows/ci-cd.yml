name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:5.0
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install Backend Dependencies
      run: cd backend && npm install
    
    - name: Run Backend Linter
      run: cd backend && npm run lint --if-present
      continue-on-error: true
    
    - name: Run Backend Tests
      run: cd backend && npm test --if-present
      continue-on-error: true
      env:
        MONGODB_URI: mongodb://localhost:27017/lost-and-found-test
        JWT_SECRET: test_secret_key
        NODE_ENV: test

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install Frontend Dependencies
      run: cd frontend && npm install
    
    - name: Run Frontend Linter
      run: cd frontend && npm run lint --if-present
      continue-on-error: true
    
    - name: Run Frontend Tests
      run: cd frontend && npm test -- --watchAll=false --coverage
      continue-on-error: true
    
    - name: Build Frontend
      run: cd frontend && npm run build

  backend-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install Backend Dependencies
      run: cd backend && npm install --production
    
    - name: Start Backend Server
      run: cd backend && timeout 10 npm start &
      continue-on-error: true
    
    - name: Verify Backend Health
      run: sleep 5 && curl http://localhost:5000/api/health || true
      continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install Frontend Dependencies
      run: cd frontend && npm install
    
    - name: Build Frontend
      run: cd frontend && npm run build
    
    - name: Verify Build
      run: test -d frontend/build && echo "Build successful!" || exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: always()
    
    steps:
    - name: Success Message
      if: success()
      run: echo "✅ All checks passed!"
    
    - name: Failure Message
      if: failure()
      run: echo "❌ Some checks failed. Please review the logs."
